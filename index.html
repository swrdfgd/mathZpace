	  let str = num.toString();

	async function fetchJSON(url) {
		const res = await fetch(url);
		if (!res.ok) throw new Error("Network error");
		return res.json();
	}
	
	async function getLatestQuestion() {
	  //MathStackExchange
	  newestData = await fetchJSON(
			`https://api.stackexchange.com/2.3/questions?order=desc&sort=creation&site=math&pagesize=1`

		  }

		  }

    function getRandomColor() {
      const letters = '0123456789ABCDEF';
      let color = '#';
      for (let i = 0; i < 6; i++) {
        color += letters[Math.floor(Math.random() * 16)];
      }
      return color;
    }

	function shuffleArray(array) {
	  const newArray = [...array];
	  for (let i = newArray.length - 1; i > 0; i--) {
		const j = Math.floor(Math.random() * (i + 1));
		[newArray[i], newArray[j]] = [newArray[j], newArray[i]];
	  }
	  return newArray;
	}
	
	function newLinkGen(title, index){
		if (title == 'Mathsolar'){
			if (Math.random() < 0.5){
				document.getElementById(`math-button-${index + 1}`).href = `https://www.mathsolar.com/posting/${1+Math.floor(Math.random()*10571)}`;
			}
			else {
				document.getElementById(`math-button-${index + 1}`).href = `https://www.mathsolar.com/materi/${1+Math.floor(Math.random()*310)}`;
			}
			return
		}
		if (title == 'Stack Exchange Mathematics'){
			document.getElementById(`math-button-${index + 1}`).href = `https://math.stackexchange.com/questions/${1+Math.floor(Math.random()*maxIdStackExchange)}`;
			return
		}
		if (title == 'MathOverflow'){
			document.getElementById(`math-button-${index + 1}`).href = `https://mathoverflow.net/questions/${1+Math.floor(Math.random()*maxIdMathOverflow)}`;
			return
		}
		if (title == 'Scribd'){
			document.getElementById(`math-button-${index + 1}`).href = `https://www.scribd.com/doc/${1+Math.floor(Math.random()*901441089)}`;
			return
		}
		if (title == 'Wikipedia'){
			document.getElementById(`math-button-${index + 1}`).href = `https://en.wikipedia.org/wiki/Special:RandomInCategory?wpcategory=${daftarKategori[Math.floor(Math.random() * daftarKategori.length)][0]}`;
			return

		if (title == 'HAL Open Science'){
			document.getElementById(`math-button-${index + 1}`).href = `https://hal.science/hal-${padNumber(1+Math.floor(Math.random()*5138794),8)}`;
			return
		}
		if (title == 'EUDML'){
			document.getElementById(`math-button-${index + 1}`).href = `https://eudml.org/doc/${1+Math.floor(Math.random()*64744)}`;
			return
		}
		if (title == 'Online Encyclopedia of Integer Sequences'){
			document.getElementById(`math-button-${index + 1}`).href = `https://oeis.org/A${padNumber(1+Math.floor(Math.random()*999999),6)}`;
			return
		}
	}
	
	buttonList = [];
    function generateButtons() {
      const shuffledLinks = shuffleArray([...mathLinks]);
      const mainContent = document.getElementById("main-content");
      shuffledLinks.slice(0, 10).forEach((link, index) => {
        const anchor = document.createElement("a");
        anchor.href = link.url;
        anchor.target = "_blank";
        anchor.id = `math-button-${index + 1}`;

        const btn = document.createElement("button");
        btn.textContent = link.title;
        btn.className = "math-button";
		btn.id = `math-btn-${index + 1}`;
        btn.style.backgroundColor = getRandomColor();
		btn.onclick = () => newLinkGen(link.title, index);
		buttonList.push(btn)

        anchor.appendChild(btn);
        mainContent.appendChild(anchor);
      });
	  
	  for (const btn in buttonList) {
		buttonList[btn].onclick();
	  }
    }


    window.onload = () => {
      generateButtons();
    };

  <script>
	var sisip = Math.floor(Math.random()*5);
	var maxResults = 1,
		daftarweb = ['https://pak-anang.blogspot.com/',

		'https://www.folderosn.com/',
		'https://pronouncemath.blogspot.com/',

		'https://mathsedideas.blogspot.com/',
		'https://www.openalgebra.com/',
		'https://www.trigcheatsheet.com/',
		],
		homePage = [];
		countContainerId = 0,
		containerId = 'blog-links';
	function getRandomInt(min, max) {
		return Math.floor(Math.random() * (max - min + 1)) + min;
	}


	function ArlinaRandomPosts(json) {
		var startIndex = getRandomInt(1, (json.feed.openSearch$totalResults.$t - maxResults));
		// console.log('Get the post feed start from ' + startIndex + ' until ' + (startIndex + maxResults));
		document.write('<scr' + 'ipt src="' + homePage[countContainerId] + '/feeds/posts/summary?alt=json-in-script&orderby=updated&start-index=' + startIndex + '&max-results=' + maxResults + '&callback=randomPosts"></scr' + 'ipt>');
	}
	function randomPosts(json) {
		var link, ct = document.getElementById(containerId),
			entry = shuffleArray(json.feed.entry),
			skeleton = "";
			countContainerId++;
			containerId = 'blog-links' + countContainerId;
			if (countContainerId-1 == sisip){
				pilihanSisip = articleLinks[Math.floor(Math.random()*articleLinks.length)];
				link = pilihanSisip[1]
				articleTitle = pilihanSisip[0]
			}
			else{
				for (var j = 0, jen = entry[0].link.length; j < jen; j++) {
					link = (entry[0].link[j].rel == "alternate") ? entry[0].link[j].href : '#';
				}
				articleTitle = entry[0].title.$t;
			}
			skeleton += '<a href="' + link + '" target="_blank">' + articleTitle + '</a>';
			ct.innerHTML = skeleton;
		
		
	}
	
	for (var i = 0; i < 5; i++){
		containerId = 'blog-links' + countContainerId;
		pilihanweb = Math.floor(Math.random()*(daftarweb.length));
		homePage.push(daftarweb[pilihanweb]);
		document.write('<scr' + 'ipt src="' + homePage[countContainerId] + '/feeds/posts/summary?alt=json-in-script&max-results=0&callback=ArlinaRandomPosts"></scr' + 'ipt>');
	}
  </script>
